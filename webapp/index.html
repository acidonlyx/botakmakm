<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АКМ Авто — Личный кабинет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 22px; margin-bottom: 4px; }
        p.subtitle { color: var(--text-muted); font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .tile {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            box-sizing: border-box;
        }
        .tile.full { grid-column: span 2; }
        .tile-title { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tile-value { font-size: 20px; font-weight: 700; color: var(--text-main); }
        
        .btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .section-title { font-size: 16px; font-weight: 600; margin: 20px 0 10px 0; }
        .car-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            margin-top: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Личный кабинет</h1>
    <p class="subtitle">Ваша программа лояльности в «АКМ Авто»</p>

    <!-- Плитки ключевых показателей -->
    <div class="grid">
        <div class="tile">
            <div class="tile-title">Баланс баллов</div>
            <div class="tile-value" id="val-balance">0</div>
        </div>
        <div class="tile">
            <div class="tile-title">Скидка</div>
            <div class="tile-value" id="val-discount">0%</div>
        </div>
        <div class="tile">
            <div class="tile-title">Ваш кэшбэк</div>
            <div class="tile-value" id="val-cashback">1%</div>
        </div>
        <div class="tile">
            <div class="tile-title">Рефералы</div>
            <div class="tile-value" id="val-refs">0 чел.</div>
        </div>
    </div>

    <!-- Реферальная ссылка -->
    <div class="tile full">
        <div class="tile-title">Реферальная программа</div>
        <p style="font-size: 13px; color: var.text-muted; margin: 4px 0 10px 0;">Приглашайте друзей и получайте пассивный доход с их чеков!</p>
        <input type="text" id="ref-link" readonly style="font-size: 12px; text-align: center;" onclick="this.select()">
    </div>

    <!-- Гараж -->
    <div class="section-title">🚘 Ваш гараж</div>
    <div id="garage-container">
        <div class="car-card" style="color: var(--text-muted); text-align: center;">Загрузка автомобилей...</div>
    </div>

    <!-- Быстрая запись на ремонт прямо из Mini App -->
    <div class="section-title">📅 Записаться на ремонт</div>
    <div class="tile full" style="padding: 14px;">
        <label style="font-size: 13px; color: var(--text-muted);">Выберите или укажите авто:</label>
        <input type="text" id="repair-car" placeholder="Например: Kia Sportage (А000АА178)">
        
        <label style="font-size: 13px; color: var(--text-muted); display: block; margin-top: 10px;">Опишите проблему:</label>
        <textarea id="repair-reason" rows="3" placeholder="Что необходимо сделать..."></textarea>
        
        <button class="btn" onclick="sendRepairRequest()">Отправить заявку</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Демо-данные для локального тестирования (в реальной среде подгружаются из Telegram/Backend)
    const user = {
        balance: 750,
        discount: 0,
        cashbackRate: 1,
        refsCount: 0,
        refLink: `https://t.me/akmautospb_bot?start=${tg.initDataUnsafe?.user?.id || 'demo'}`,
        cars: [
            { brand: "Kia Sportage", plate: "А000АА178", vin: "XWE...12345" }
        ]
    };

    // Отрисовка интерфейса
    document.getElementById("val-balance").textContent = user.balance.toLocaleString() + " 🪩";
    document.getElementById("val-discount").textContent = user.discount + "%";
    document.getElementById("val-cashback").textContent = user.cashbackRate + "%";
    document.getElementById("val-refs").textContent = user.refsCount + " чел.";
    document.getElementById("ref-link").value = user.refLink;

    const garageDiv = document.getElementById("garage-container");
    garageDiv.innerHTML = "";
    user.cars.forEach((car, index) => {
        garageDiv.innerHTML += `
            <div class="car-card">
                <b>🚗 Авто ${index + 1}:</b> ${car.brand}<br>
                <span style="color: var(--text-muted);">Гос. номер: ${car.plate} | VIN: ${car.vin}</span>
            </div>
        `;
    });

    function sendRepairRequest() {
        const car = document.getElementById("repair-car").value.trim();
        const reason = document.getElementById("repair-reason").value.trim();

        if (!car || !reason) {
            alert("Пожалуйста, заполните автомобиль и причину обращения.");
            return;
        }

        // Передаем данные обратно в Telegram-бота через метод sendData
        const payload = JSON.stringify({
            action: "repair",
            car: car,
            reason: reason
        });

        tg.sendData(payload);
    }
</script>
</body>
</html>
